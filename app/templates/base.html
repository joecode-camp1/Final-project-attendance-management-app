<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AttendanceMS{% endblock %}</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- NAVBAR (shared) -->
    <nav class="navbar">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" alt="Logo">
        </div>

        <ul>
            <li><a href="{{ url_for('home.index') }}">Home</a></li>
            <li><a href="{{ url_for('home.index') }}#features">Features</a></li>
            <li><a href="{{ url_for('home.about') }}">About Us</a></li>
            <li><a href="{{ url_for('home.index') }}#contact">Contact Us</a></li>
            <li><a href="{{ url_for('auth.login') }}">Login</a></li>
        </ul>
    </nav>

    <!-- PAGE CONTENT GOES HERE -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER (shared) -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 AttendanceMS. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
